name: Update Neovim lazy-lock.json
on:
  schedule:
    - cron: "0 9 * * 1,4"
  workflow_dispatch:
jobs:
  update-plugins:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable
      - name: Update lazy-lock.json
        run: nvim --headless "+Lazy! update" +qa
        env:
          HOME: /root
      - uses: peter-evans/create-pull-request@v8
        id: cpr
        with:
          commit-message: "chore(nvim): update lazy-lock.json"
          branch: chore/update-lazy-lock
          delete-branch: true
          title: "chore(nvim): update lazy-lock.json"
          labels: dependencies
          add-paths: private_dot_config/nvim/lazy-lock.json
      - if: steps.cpr.outputs.pull-request-number
        run: gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
