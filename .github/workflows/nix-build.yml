name: Nix Build

on:
  pull_request:
    branches: [main]
    paths:
      - "nix/**"

jobs:
  build-darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            extra-substituters = https://devenv.cachix.org
            extra-trusted-public-keys = devenv.cachix.org-1:w1cLUi8dv3hnoSPGAuibQv+f9TZLr6cv/Hm9XgU50cw=

      - name: Build darwinConfigurations.axon (dry-run)
        run: nix build --flake ./nix/nixos#darwinConfigurations.axon.system --dry-run

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            extra-substituters = https://devenv.cachix.org
            extra-trusted-public-keys = devenv.cachix.org-1:w1cLUi8dv3hnoSPGAuibQv+f9TZLr6cv/Hm9XgU50cw=

      - name: Build packages.x86_64-linux.ribosome-env (dry-run)
        run: nix build --flake ./nix/nixos#packages.x86_64-linux.ribosome-env --dry-run
