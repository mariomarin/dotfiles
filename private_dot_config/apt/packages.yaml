# APT packages for linux-apt platform (minimal - most tools come from nix profile)
packages:
  # Shells (need /etc/shells entry)
  - zsh
  - bash
  # Version control (needed by bootstrap before nix)
  - git
  - git-lfs
  # Core system utils (needed early or by other tools)
  - curl
  - wget
  - file
  - unzip
