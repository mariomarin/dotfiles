## Atuin sync server configuration
## Self-hosted on devbox (devrestricted) for history sync across machines
## See: https://docs.atuin.sh/self-hosting/server-setup/

## Network
## Listen on localhost only - accessed via SSH tunnel from Mac
host = "127.0.0.1"
port = 8888

## Registration
## Set to true initially to register users, then disable
## Change to false after initial user registration
open_registration = true

## Database
## SQLite for single-user setup (no PostgreSQL needed)
## Atuin creates this automatically in ~/.local/share/atuin/
## Set via systemd Environment: ATUIN_DB_URI=sqlite://%h/.local/share/atuin/server.db
# db_uri commented out - set via ATUIN_DB_URI env var in systemd service

## Limits
## No limits for personal use
max_history_length = 8192
max_record_size = 1048576
page_size = 1000
