prSections:
  - title: My PRs
    filters: is:open author:@me
  - title: Needs Review
    filters: is:open review-requested:@me
  - title: Recently Merged
    filters: is:merged author:@me sort:updated-desc
    limit: 10
issuesSections:
  - title: My Issues
    filters: is:open author:@me
  - title: Assigned
    filters: is:open assignee:@me
defaults:
  prsLimit: 20
  issuesLimit: 20
  preview:
    open: true
    width: 60
keybindings:
  prs:
    - key: o
      command: gh pr view {{.PrNumber}} --web
    - key: c
      command: gh pr checkout {{.PrNumber}}
